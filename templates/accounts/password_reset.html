{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Reset Password{% endblock %}

{% block auth_content %}
<div class="ct-auth-page">
  <div class="ct-auth-card">
    <div class="ct-auth-logo"><i class="bi bi-shield-check"></i></div>
    <h1 class="ct-auth-title">ComplaintTracker</h1>
    <p class="ct-auth-subtitle">Reset your password</p>
    <hr>
    <p class="small text-muted">Enter your email and we'll send you a reset link.</p>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
    </form>
    <div class="mt-3 text-center small">
      <a href="{% url 'accounts:login' %}">Back to Sign In</a>
    </div>
  </div>
</div>
{% endblock %}

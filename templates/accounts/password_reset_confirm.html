{% extends "base.html" %}
{% block title %}Set New Password{% endblock %}
{% block auth_content %}
<div class="ct-auth-page">
  <div class="ct-auth-card">
    <h4>Set New Password</h4>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary w-100">Change Password</button>
    </form>
  </div>
</div>
{% endblock %}

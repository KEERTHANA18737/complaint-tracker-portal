{% extends "base.html" %}
{% block title %}Email Sent{% endblock %}
{% block auth_content %}
<div class="ct-auth-page">
  <div class="ct-auth-card text-center">
    <i class="bi bi-envelope-check display-4 text-success mb-3"></i>
    <h4>Check Your Email</h4>
    <p class="text-muted">If an account exists for that email address, a reset link has been sent.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary">Back to Sign In</a>
  </div>
</div>
{% endblock %}

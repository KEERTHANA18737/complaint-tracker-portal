{% extends "base.html" %}
{% block title %}404 Not Found{% endblock %}
{% block content %}
<div class="ct-empty-state" style="min-height:60vh;">
  <i class="bi bi-exclamation-circle display-1 text-warning"></i>
  <h2 class="mt-3">404 – Page Not Found</h2>
  <p class="text-muted">The page you're looking for doesn't exist or has been moved.</p>
  <a href="{% url 'dashboard:index' %}" class="btn btn-primary">Go to Dashboard</a>
</div>
{% endblock %}
